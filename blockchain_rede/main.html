<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
        <template id="bloco-template">
            <div class="bloco">
                <textarea disabled class="title"></textarea>
                <br>
                <textarea disabled class="text">nonce</textarea><textarea class="nonce-output" disabled>0</textarea>
                <br>
                <textarea disabled class="text">dados</textarea><textarea class="data-input"></textarea>
                <br>
                <textarea disabled class="text">prévio</textarea><textarea disabled class="previous-hash-output">?</textarea>
                <br>
                <textarea disabled class="text">hash</textarea><textarea disabled class="hash-output"></textarea>
                <br>
                <textarea disabled class="text"></textarea><button class="minerar-btn">minerar</button>
            </div>
            <br><br>
        </template>


    <button id="check" hidden>check</button>
    <input type="checkbox" id="globalsync" checked>
    <label for="globalsync">sincronizar automaticamente</label>
    <div class="blockchain-container">

    
        <div id="anode" data-broken="0" data-blocks="1" data-fullblocks="0">
            <div class="bloco" id="a1">
                <textarea disabled class="title">Bloco #a1</textarea>
                <br>
                <textarea disabled class="text">nonce</textarea><textarea class="nonce-output" id="a1"disabled>0</textarea>
                <br>
                <textarea disabled class="text">dados</textarea><textarea class="data-input" id="a1"></textarea>
                <br>
                <textarea disabled class="text">prévio</textarea><textarea disabled class="previous-hash-output" id="a1">?</textarea>
                <br>
                <textarea disabled class="text">hash</textarea><textarea disabled class="hash-output" id="a1"></textarea>
                <br>
                <textarea disabled class="text"></textarea><button class="minerar-btn" id="a1">minerar</button>
            </div>
            <br><br> 

            <button id="novo-bloco-btn" data-col="1" data-row="a">novo bloco</button>
            <input type="checkbox" id="async" >
            <label for="async">sincronizar</label>
        </div>


        <div id="bnode" data-broken="0" data-blocks="1" data-fullblocks="0">
            <div class="bloco" id="b1">
                <textarea disabled class="title">Bloco #b1</textarea>
                <br>
                <textarea disabled class="text">nonce</textarea><textarea class="nonce-output" id="b1"disabled>0</textarea>
                <br>
                <textarea disabled class="text">dados</textarea><textarea class="data-input" id="b1"></textarea>
                <br>
                <textarea disabled class="text">prévio</textarea><textarea disabled class="previous-hash-output" id="b1">?</textarea>
                <br>
                <textarea disabled class="text">hash</textarea><textarea disabled class="hash-output" id="b1"></textarea>
                <br>
                <textarea disabled class="text"></textarea><button class="minerar-btn" id="b1">minerar</button>
            </div>
            <br><br> 

            <button id="novo-bloco-btn" data-col="1" data-row="b">novo bloco</button>
            <input type="checkbox" id="bsync" >
            <label for="bsync">sincronizar</label>
        </div>


        <div id="cnode" data-broken="0" data-blocks="1" data-fullblocks="0">
            <div class="bloco" id="c1">
                <textarea disabled class="title">Bloco #c1</textarea>
                <br>
                <textarea disabled class="text">nonce</textarea><textarea class="nonce-output" id="c1"disabled>0</textarea>
                <br>
                <textarea disabled class="text">dados</textarea><textarea class="data-input" id="c1"></textarea>
                <br>
                <textarea disabled class="text">prévio</textarea><textarea disabled class="previous-hash-output" id="c1">?</textarea>
                <br>
                <textarea disabled class="text">hash</textarea><textarea disabled class="hash-output" id="c1"></textarea>
                <br>
                <textarea disabled class="text"></textarea><button class="minerar-btn" id="c1">minerar</button>
                
            </div>
            <br><br> 


            <button id="novo-bloco-btn" data-col="1" data-row="c">novo bloco</button>
            <input type="checkbox" id="csync" >
            <label for="csync">sincronizar</label>
        </div>

    </div> 

    <script src="main.js"></script>
</body>
</html>
